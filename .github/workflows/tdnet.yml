name: TDnet Alert

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: pip install -r requirements.txt

      - run: python tdnet_alert.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Save notified history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if [ -f notified.json ]; then
            git add notified.json
            git commit -m "Update notified history" || echo "No changes"
            git push
          else
            echo "notified.json not found; no notifications this run"
          fi
